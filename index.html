<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>🌱 The Three Healthies</title>

<style>
:root {
  --green:#16a34a; --green-l:#dcfce7; --green-d:#14532d;
  --orange:#ea580c; --bg:#f0fdf4; --card:#ffffff;
  --border:#e2e8f0; --text:#1e293b; --muted:#64748b;
  --dad:#3b82f6; --mom:#ec4899; --son:#8b5cf6;
  --r:14px; --shadow:0 2px 8px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:72px;}

/* HEADER */
.hdr{background:var(--green);color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-left{display:flex;align-items:center;gap:8px;}
.hdr-title{font-size:17px;font-weight:800;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .3s;}
.live-dot.on{background:#4ade80;box-shadow:0 0 6px #4ade80;}
.hdr-date{font-size:12px;opacity:.85;}

/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.06);}
.nav-btn{flex:1;border:none;background:none;padding:7px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--muted);cursor:pointer;}
.nav-btn .nb-icon{font-size:22px;line-height:1;}
.nav-btn.on{color:var(--green);font-weight:700;}

/* PAGES */
.page{display:none;padding:16px;}
.page.on{display:block;}
h2{font-size:20px;font-weight:800;margin-bottom:14px;}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);padding:14px;margin-bottom:12px;}
.card-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px;}

/* WHO SELECTOR */
.who-bar{display:flex;gap:8px;margin-bottom:14px;}
.who-btn{flex:1;border:2px solid var(--border);background:#fff;border-radius:10px;padding:9px 6px;font-size:13px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .18s;}
.who-btn .wi{font-size:26px;line-height:1;}
.who-btn.on{border-color:var(--green);background:var(--green-l);color:var(--green-d);}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.cat-card{border-radius:12px;padding:10px 6px 8px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .18s;position:relative;user-select:none;}
.cat-card:active{transform:scale(.96);}
.cat-card .ce{font-size:26px;display:block;margin-bottom:3px;}
.cat-card .cn{font-size:10px;font-weight:700;line-height:1.2;}
.cat-card .cx{font-size:10px;margin-top:3px;opacity:.7;}
.cat-card .cf{font-size:9px;margin-top:2px;opacity:.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chk{position:absolute;top:3px;right:3px;background:var(--green);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center;}

/* Category colours */
.c-fr{background:#fff1f2;border-color:#fecdd3;color:#9f1239;}
.c-gv{background:#f0fdf4;border-color:#bbf7d0;color:#14532d;}
.c-ov{background:#fff7ed;border-color:#fed7aa;color:#9a3412;}
.c-pr{background:#faf5ff;border-color:#e9d5ff;color:#581c87;}
.c-da{background:#eff6ff;border-color:#bfdbfe;color:#1e3a8a;}
.c-ns{background:#fffbeb;border-color:#fde68a;color:#78350f;}
.c-wg{background:#f7fee7;border-color:#d9f99d;color:#365314;}
.c-wa{background:#ecfeff;border-color:#a5f3fc;color:#164e63;}

/* MISSIONS */
.mission{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;background:#fff;transition:all .18s;}
.mission.on{background:var(--green-l);border-color:var(--green);}
.mission:active{transform:scale(.99);}
.me{font-size:20px;}
.mi{flex:1;}
.mn{font-size:13px;font-weight:600;}
.mx{font-size:11px;color:var(--muted);}
.mc{font-size:18px;}

/* STAT ROW */
.stat-row{display:flex;gap:8px;margin-bottom:12px;}
.stat{flex:1;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;}
.sv{font-size:20px;font-weight:800;color:var(--green);}
.sl{font-size:10px;color:var(--muted);margin-top:2px;}

/* TODAY - MEMBER CARDS */
.m-today{background:#fff;border-radius:var(--r);border:2px solid var(--border);padding:13px;margin-bottom:12px;}
.mt-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.mt-name{font-size:17px;font-weight:800;}
.mt-tags{display:flex;gap:5px;align-items:center;margin-top:4px;flex-wrap:wrap;}
.lv-pill{display:inline-flex;align-items:center;background:linear-gradient(135deg,var(--green),#15803d);color:#fff;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;}
.sk-pill{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600;}
.mt-xp{text-align:right;}
.mt-xpval{font-size:22px;font-weight:800;color:var(--green);}
.mt-xplbl{font-size:10px;color:var(--muted);}
.vbadge{background:linear-gradient(135deg,#ea580c,#dc2626);color:#fff;border-radius:8px;padding:3px 8px;font-size:11px;font-weight:700;display:inline-block;margin-top:4px;}
.cat-dots{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.cd{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:.2;transition:opacity .3s;}
.cd.on{opacity:1;}
.mt-prog{margin-top:6px;font-size:12px;color:var(--muted);}

/* LEADERBOARD */
.lb-tabs{display:flex;gap:6px;margin-bottom:14px;}
.lb-tab{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .18s;}
.lb-tab.on{background:var(--green);color:#fff;border-color:var(--green);}
.lb-row{display:flex;align-items:center;gap:10px;padding:13px;background:#fff;border-radius:12px;border:2px solid var(--border);margin-bottom:8px;transition:all .18s;}
.lb-rank{font-size:24px;font-weight:900;width:38px;text-align:center;}
.lb-icon{font-size:30px;}
.lb-info{flex:1;}
.lb-name{font-size:15px;font-weight:800;}
.lb-detail{font-size:11px;color:var(--muted);margin-top:3px;}
.lb-xp{text-align:right;}
.lb-xpv{font-size:24px;font-weight:800;color:var(--green);}
.lb-xpl{font-size:10px;color:var(--muted);}
.lb-row.gold{border-color:#fbbf24;background:#fffbeb;}
.lb-row.silver{border-color:#94a3b8;background:#f8fafc;}
.lb-row.bronze{border-color:#d97706;background:#fef3c7;}

/* BADGES */
.badge-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.badge-card{background:#fff;border-radius:12px;border:2px solid var(--border);padding:14px;text-align:center;}
.badge-icon{font-size:38px;margin-bottom:5px;}
.badge-name{font-size:13px;font-weight:800;margin-bottom:3px;}
.badge-desc{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:8px;}
.badge-owners{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;}
.boc{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.boc.yes{background:var(--green-l);color:var(--green-d);}
.boc.no{background:#f1f5f9;color:var(--muted);}
.badge-card.full{border-color:var(--green);background:#f0fdf4;}

/* FOOD OVERLAY */
#food-ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);align-items:flex-end;}
#food-ov.on{display:flex;}
.food-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:82vh;display:flex;flex-direction:column;}
.fs-handle{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:12px auto 0;}
.fs-search{padding:10px 16px;border-bottom:1px solid var(--border);}
.fs-search input{width:100%;padding:9px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:15px;outline:none;background:#f8fafc;}
.fs-search input:focus{border-color:var(--green);}
.fs-skip{margin:10px 16px 2px;padding:11px;background:#f8fafc;border:1.5px dashed var(--border);border-radius:10px;text-align:center;cursor:pointer;font-size:13px;color:var(--muted);font-weight:600;}
.fs-skip:hover{background:var(--green-l);border-color:var(--green);color:var(--green-d);}
.food-list{overflow-y:auto;flex:1;padding:6px 16px 16px;}
.fi{padding:11px 10px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .15s;}
.fi:hover,.fi:active{background:var(--green-l);}
.fi-name{font-size:14px;font-weight:500;}
.fi-right{display:flex;align-items:center;gap:6px;}
.sf-badge{background:#fef3c7;color:#b45309;border-radius:6px;padding:1px 6px;font-size:10px;font-weight:700;}
.fi-xp{font-size:12px;font-weight:700;color:var(--green);}
.fi.logged-food .fi-name{color:var(--muted);text-decoration:line-through;}
/* Logged food chips */
#logged-chips{padding:8px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:6px;display:none;}
#logged-chips.on{display:flex;}
.lc{background:#dcfce7;color:#14532d;border-radius:20px;padding:5px 8px 5px 11px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;}
.lc-x{background:none;border:none;color:#166534;font-size:16px;line-height:1;cursor:pointer;padding:0;opacity:.6;}
.lc-x:hover,.lc-x:active{opacity:1;}

/* Logged category card state */
.cat-card.c-logged{opacity:.72;filter:saturate(.7);}
.cat-card.c-logged .chk{display:flex;}

/* CALENDAR */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:18px;cursor:pointer;color:var(--text);}
.cal-nav-btn:disabled{opacity:.3;cursor:default;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;}
.cal-day{border-radius:7px;padding:4px 2px;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:1px;background:#f1f5f9;}
.cal-day.empty{background:transparent;}
.cal-day.future{background:#f8fafc;opacity:.35;}
.cal-day .cd-num{font-size:11px;font-weight:600;color:var(--muted);}
.cal-day .cd-xp{font-size:10px;font-weight:800;color:var(--green);}
.cal-day .cd-fire{font-size:10px;line-height:1;}
.cal-day.xp1{background:#dcfce7;}
.cal-day.xp2{background:#86efac;}
.cal-day.xp3{background:#4ade80;}
.cal-day.xp4{background:#16a34a;}
.cal-day.xp4 .cd-num{color:rgba(255,255,255,.8);}
.cal-day.xp4 .cd-xp{color:#fff;}
.cal-day.today-cell{outline:2px solid var(--green);outline-offset:-2px;}

/* VIRAT OVERLAY */
#virat-ov{display:none;position:fixed;inset:0;z-index:300;background:linear-gradient(135deg,#ea580c,#dc2626,#7f1d1d);align-items:center;justify-content:center;text-align:center;color:#fff;padding:24px;}
#virat-ov.on{display:flex;}
.vc{max-width:320px;width:100%;}
.vflame{font-size:80px;display:block;margin-bottom:12px;animation:flamepulse 1s ease-in-out infinite;}
@keyframes flamepulse{0%,100%{transform:scale(1) rotate(-2deg);}50%{transform:scale(1.12) rotate(2deg);}}
.vt{font-size:34px;font-weight:900;letter-spacing:-.02em;line-height:1.1;text-shadow:0 2px 12px rgba(0,0,0,.3);}
.vwho{font-size:22px;font-weight:700;margin:10px 0 6px;opacity:.95;}
.vsub{font-size:14px;opacity:.85;margin-bottom:20px;line-height:1.5;}
.vxp{font-size:26px;font-weight:800;background:rgba(255,255,255,.2);border-radius:12px;padding:10px 20px;margin-bottom:22px;display:block;}
.vbtn{background:#fff;color:#ea580c;border:none;border-radius:14px;padding:14px 28px;font-size:18px;font-weight:800;cursor:pointer;width:100%;}

/* TOAST */
#toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(8px);background:#1e293b;color:#fff;padding:9px 18px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:400;white-space:nowrap;max-width:90vw;text-align:center;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* XP POP */
.xp-pop{position:fixed;font-size:22px;font-weight:900;color:var(--green);pointer-events:none;z-index:500;text-shadow:0 2px 6px rgba(0,0,0,.15);animation:xpfloat 1.2s ease-out forwards;}
@keyframes xpfloat{0%{opacity:1;transform:translateY(0) scale(1);}60%{opacity:1;transform:translateY(-40px) scale(1.1);}100%{opacity:0;transform:translateY(-70px) scale(.9);}}

/* CONFETTI */
.conf{position:fixed;z-index:299;pointer-events:none;border-radius:3px;animation:conffall linear forwards;}
@keyframes conffall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

/* EMPTY */
.empty{text-align:center;padding:32px 16px;color:var(--muted);}
.empty .ei{font-size:48px;margin-bottom:8px;}
</style>
</head>

// ── LocalStorage ──────────────────────────────────────────────────────────────
function lsLoad(){ try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}} }
function lsSave(d){ try{localStorage.setItem(SK,JSON.stringify(d))}catch{} }
function lsGet(k,def){ const s=lsLoad(); return k in s?s[k]:def; }
function lsSet(k,v){ const s=lsLoad(); s[k]=v; lsSave(s); }

// ── Date helpers ──────────────────────────────────────────────────────────────
function today(){ return new Date().toISOString().split('T')[0]; }
function yday(){  const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().split('T')[0]; }
function wkStart(){
  const d=new Date(); const dy=d.getDay();
  d.setDate(d.getDate()-dy+(dy===0?-6:1));
  return d.toISOString().split('T')[0];
}
function moStart(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}

// ── Cache helpers ─────────────────────────────────────────────────────────────
function getLog(date,m){ return cache.logs?.[date]?.[m]??null; }

function mkLog(date,m){
  if(!cache.logs)cache.logs={};
  if(!cache.logs[date])cache.logs[date]={};
  if(!cache.logs[date][m]){
    cache.logs[date][m]={
      cats:Object.fromEntries(CATS.map(c=>[c.id,{logged:false,foods:[],xp:0}])),
      msns:Object.fromEntries(MISSIONS.map(ms=>[ms.id,false])),
      totalXP:0, virat:false, viratAwarded:false,
    };
  }
  return cache.logs[date][m];
}

function getSt(m){
  if(!cache.stats)cache.stats={};
  if(!cache.stats[m]) cache.stats[m]={
    totalXP:0,weeklyXP:0,monthlyXP:0,streak:0,longestStreak:0,
    lastStreakDate:null,earnedBadges:[],viratCount:0,level:1,
    wkStart:wkStart(),moStart:moStart(),
  };
  return cache.stats[m];
}

// ── Game logic ─────────────────────────────────────────────────────────────────
function getLevel(xp){
  for(let i=LEVELS.length-1;i>=0;i--) if(xp>=LEVELS[i].xp) return LEVELS[i];
  return LEVELS[0];
}

function resetPeriods(m){
  const s=getSt(m);
  if(s.wkStart!==wkStart()){s.weeklyXP=0;s.wkStart=wkStart();}
  if(s.moStart!==moStart()){s.monthlyXP=0;s.moStart=moStart();}
}

function addXP(m,xp){
  const s=getSt(m);
  resetPeriods(m);
  s.totalXP+=xp; s.weeklyXP+=xp; s.monthlyXP+=xp;
  s.level=getLevel(s.totalXP).l;
}

function streakContrib(log){
  return log.cats.fruits.logged &&
         log.cats.protein.logged &&
         (log.cats.greenVeg.logged||log.cats.otherVeg.logged) &&
         log.cats.water.logged;
}

function updateStreak(m,dateStr,counts){
  const s=getSt(m);
  if(!counts) return;
  if(s.lastStreakDate===dateStr) return;
  const prevYday = s.lastStreakDate===yday();
  s.streak = prevYday ? s.streak+1 : 1;
  s.longestStreak=Math.max(s.longestStreak,s.streak);
  s.lastStreakDate=dateStr;
}

function checkStreakBreak(m){
  const s=getSt(m);
  if(s.lastStreakDate && s.lastStreakDate<yday()) s.streak=0;
}

function viratMode(log){
  return log.cats.fruits.logged && log.cats.greenVeg.logged &&
         log.cats.protein.logged && log.cats.water.logged &&
         log.msns.noJunkFood && log.msns.noSugaryDrinks;
}

function checkBadges(m){
  const s=getSt(m); const logs=cache.logs||{}; const newB=[];
  const dates=Object.keys(logs).sort().reverse();
  for(const b of BADGES){
    if(s.earnedBadges.includes(b.id)) continue;
    let ok=false;
    if(b.type==='catStreak'){
      let streak=0;
      for(const d of dates){
        if(logs[d][m]?.cats[b.catId]?.logged){streak++; if(streak>=b.need){ok=true;break;}}
        else break;
      }
    } else if(b.type==='catTotal'){
      ok=dates.filter(d=>logs[d][m]?.cats[b.catId]?.logged).length>=b.need;
    } else if(b.type==='msnTotal'){
      ok=dates.filter(d=>logs[d][m]?.msns[b.msnId]).length>=b.need;
    } else if(b.type==='viratTotal'){
      ok=s.viratCount>=b.need;
    }
    if(ok){s.earnedBadges.push(b.id);newB.push(b);}
  }
  return newB;
}

// ── Core log action (shared by logFood + logCatDone) ─────────────────────────
function applyLog(catId,foodName,xp){
  const dateStr=today(); const log=mkLog(dateStr,who); const cat=log.cats[catId];
  if(foodName) cat.foods.push(foodName);
  cat.logged=true; cat.xp+=xp; log.totalXP+=xp;
  addXP(who,xp);
  updateStreak(who,dateStr,streakContrib(log));
  if(!log.viratAwarded&&viratMode(log)){
    log.virat=true; log.viratAwarded=true;
    log.totalXP+=VIRAT_XP; const s=getSt(who);
    s.totalXP+=VIRAT_XP; s.weeklyXP+=VIRAT_XP; s.monthlyXP+=VIRAT_XP;
    s.viratCount++; s.level=getLevel(s.totalXP).l;
    setTimeout(()=>showVirat(who),500);
  }
  const nb=checkBadges(who);
  if(nb.length) setTimeout(()=>nb.forEach(b=>toast(`🎖️ Badge Unlocked: ${b.name}!`)),900);
  writeCache();
}

function closeFoodOv(){

}
function filterFoods(q){
  if(!activeCat) return;
  const log=getLog(today(),who);
  const loggedFoods=log?.cats[activeCat]?.foods||[];
  const logged=new Set(loggedFoods);
  const alreadyCat=log?.cats[activeCat]?.logged||false;
  // Render logged food chips
  const chips=document.getElementById('logged-chips');
  if(loggedFoods.length){
    chips.className='on';
    chips.innerHTML=loggedFoods.map(f=>
      `<span class="lc">${f}<button class="lc-x" onclick="unlogFood('${activeCat}','${f.replace(/'/g,"\\'")}')">×</button></span>`
    ).join('');
  } else {
    chips.className=''; chips.innerHTML='';
  }
  // Toggle mark-done vs unlog button
  const skipBtn=document.getElementById('fs-skip');
  if(alreadyCat){
    skipBtn.textContent='↩ Unlog this category';
    skipBtn.onclick=()=>unlogCat(activeCat);
    skipBtn.style.color='#dc2626'; skipBtn.style.borderColor='#fca5a5'; skipBtn.style.background='#fff5f5';
  } else {
    skipBtn.textContent='✓ Just mark this category as done';
    skipBtn.onclick=logCatDone;
    skipBtn.style.color=''; skipBtn.style.borderColor=''; skipBtn.style.background='';
  }
  const list=FOODS[activeCat]||[];
  const filtered=q.trim()?list.filter(f=>f.toLowerCase().includes(q.toLowerCase())):list;
  const isFirst=!alreadyCat;
  document.getElementById('food-list').innerHTML=filtered.map(f=>{
    const isND=ND.has(f); const isLg=logged.has(f);
    const xp=isLg?0:(isFirst?CAT[activeCat].baseXP:0)+(isND?ND_BONUS:0);
    return `<div class="fi${isLg?' logged-food':''}" onclick="logFood('${f.replace(/'/g,"\\'")}')">
      <span class="fi-name">${isLg?'✓ ':''}${f}</span>
      <span class="fi-right">
        ${isND?'<span class="sf-badge">⭐ Superfood</span>':''}
        <span class="fi-xp">${xp>0?'+'+xp+' XP':isLg?'✓':''}</span>
      </span>
    </div>`;
  }).join('');
}

function logFood(foodName){
  if(!activeCat) return;
  const log=getLog(today(),who);
  if(log?.cats[activeCat]?.foods?.includes(foodName)){toast(`${foodName} already logged!`);return;}
  const isFirst=!log?.cats[activeCat]?.logged;
  const xp=(isFirst?CAT[activeCat].baseXP:0)+(ND.has(foodName)?ND_BONUS:0);
  applyLog(activeCat,foodName,xp);
  showXPPop(xp);
  toast(`✓ ${foodName} logged! +${xp} XP`);
  closeFoodOv();
  renderAll();
}

function logCatDone(){
  if(!activeCat) return;
  const log=getLog(today(),who);
  if(log?.cats[activeCat]?.logged){toast('Already logged!');closeFoodOv();return;}
  const xp=CAT[activeCat].baseXP;
  applyLog(activeCat,null,xp);
  showXPPop(xp);
  toast(`✓ ${CAT[activeCat].label} done! +${xp} XP`);
  closeFoodOv();
  renderAll();
}

function unlogFood(catId, foodName){
  const dateStr=today();
  const log=mkLog(dateStr,who);
  const cat=log.cats[catId];
  const idx=cat.foods.indexOf(foodName);
  if(idx===-1) return;
  const oldXP=cat.xp;
  cat.foods.splice(idx,1);
  // Recalc category XP from remaining foods
  let newXP=0;
  if(cat.foods.length>0){
    newXP=CAT[catId].baseXP;
    cat.foods.forEach(f=>{if(ND.has(f))newXP+=ND_BONUS;});
    cat.logged=true;
  } else {
    cat.logged=false;
  }
  cat.xp=newXP;
  const diff=oldXP-newXP;
  log.totalXP=Math.max(0,log.totalXP-diff);
  // Adjust stats XP
  const s=getSt(who);
  s.totalXP=Math.max(0,s.totalXP-diff);
  s.weeklyXP=Math.max(0,s.weeklyXP-diff);
  s.monthlyXP=Math.max(0,s.monthlyXP-diff);
  s.level=getLevel(s.totalXP).l;
  updateStreak(who,dateStr,streakContrib(log));
  writeCache();
  filterFoods(document.getElementById('fs-inp').value);
  renderAll();
  toast(`Removed ${foodName}`);
}

function unlogCat(catId){
  const dateStr=today();
  const log=mkLog(dateStr,who);
  const cat=log.cats[catId];
  if(!cat.logged) return;
  const diff=cat.xp;
  cat.logged=false; cat.foods=[]; cat.xp=0;
  log.totalXP=Math.max(0,log.totalXP-diff);
  const s=getSt(who);
  s.totalXP=Math.max(0,s.totalXP-diff);
  s.weeklyXP=Math.max(0,s.weeklyXP-diff);
  s.monthlyXP=Math.max(0,s.monthlyXP-diff);
  s.level=getLevel(s.totalXP).l;
  updateStreak(who,dateStr,streakContrib(log));
  writeCache();
  filterFoods(document.getElementById('fs-inp').value);
  renderAll();
  toast(`${CAT[catId].label} unlogged`);
}

// ── Mission toggle ────────────────────────────────────────────────────────────
function toggleMsn(msnId){
  const dateStr=today(); const log=mkLog(dateStr,who);
  const m=MISSIONS.find(x=>x.id===msnId);
  if(log.msns[msnId]){
    log.msns[msnId]=false; log.totalXP=Math.max(0,log.totalXP-m.xp);
    const s=getSt(who);
    s.totalXP=Math.max(0,s.totalXP-m.xp);
    s.weeklyXP=Math.max(0,s.weeklyXP-m.xp);
    s.monthlyXP=Math.max(0,s.monthlyXP-m.xp);
    toast(`${m.name} unchecked`);
  } else {
    log.msns[msnId]=true; log.totalXP+=m.xp;
    addXP(who,m.xp);
    showXPPop(m.xp); toast(`✓ ${m.name}! +${m.xp} XP`);
    if(!log.viratAwarded&&viratMode(log)){
      log.virat=true; log.viratAwarded=true;
      log.totalXP+=VIRAT_XP; const s=getSt(who);
      s.totalXP+=VIRAT_XP; s.weeklyXP+=VIRAT_XP; s.monthlyXP+=VIRAT_XP;
      s.viratCount++; s.level=getLevel(s.totalXP).l;
      setTimeout(()=>showVirat(who),500);
    }
    const nb=checkBadges(who); if(nb.length) setTimeout(()=>nb.forEach(b=>toast(`🎖️ ${b.name} badge unlocked!`)),900);
  }
  writeCache(); renderAll();
}

// ── Firestore ─────────────────────────────────────────────────────────────────
function writeCache(){
  lsSet('cache',cache);
  clearTimeout(_wt);
  _wt=setTimeout(()=>DOC.set({data:cache}).catch(e=>console.error('Write failed:',e)),600);
}

function listenFS(){
  DOC.onSnapshot(snap=>{
    document.getElementById('liveDot').classList.add('on');
    if(snap.metadata.hasPendingWrites||!snap.exists) return;
    const remote=snap.data()?.data;
    if(!remote) return;
    cache=remote; lsSet('cache',cache);
    renderAll();
  },()=>document.getElementById('liveDot').classList.remove('on'));
}

  const medals=['🥇','🥈','🥉'];
  const cls=['gold','silver','bronze'];
  const plbl={weekly:'This Week',monthly:'This Month',allTime:'All Time'};

  let h=`<h2>Leaderboard 🏆</h2>
  <div class="lb-tabs">
    ${[['weekly','This Week'],['monthly','This Month'],['allTime','All Time']].map(([p,l])=>
      `<button class="lb-tab${lbPeriod===p?' on':''}" onclick="setLbPer('${p}')">${l}</button>`
    ).join('')}
  </div>
  <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">${plbl[lbPeriod]} XP Rankings</p>`;

  ranked.forEach(({m,s,xp},i)=>{
    const lv=getLevel(s.totalXP);
    h+=`<div class="lb-row ${cls[i]||''}">
      <div class="lb-rank">${medals[i]||i+1}</div>
      <div class="lb-icon">${ICONS[m]}</div>
      <div class="lb-info">
        <div class="lb-name">${m}</div>
        <div class="lb-detail">Lv${lv.l} ${lv.name} · 🔥 ${s.streak||0}d · 🔥 ${s.viratCount||0} Virat</div>
      </div>
      <div class="lb-xp">
        <div class="lb-xpv">${xp||0}</div>
        <div class="lb-xpl">XP</div>
      </div>
    </div>`;
  });
  document.getElementById('pg-board').innerHTML=h;
}

// ── Render: Badges ────────────────────────────────────────────────────────────
function renderBadges(){
  let h='<h2>Badges 🎖️</h2><div class="badge-grid">';
  BADGES.forEach(b=>{
    const owners=MEMBERS.filter(m=>getSt(m).earnedBadges.includes(b.id));
    const full=owners.length===MEMBERS.length;
    h+=`<div class="badge-card${full?' full':''}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
      <div class="badge-desc">${b.desc}</div>
      <div class="badge-owners">
        ${MEMBERS.map(m=>`<span class="boc ${owners.includes(m)?'yes':'no'}">${ICONS[m]} ${m}</span>`).join('')}
      </div>
    </div>`;
  });
  h+='</div>';
  document.getElementById('pg-badges').innerHTML=h;
}

// ── Hidden reset ──────────────────────────────────────────────────────────────
let _rtaps=0,_rtimer;
function resetTap(){
  _rtaps++; clearTimeout(_rtimer);
  _rtimer=setTimeout(()=>_rtaps=0,2500);
  // flash header briefly so user knows the tap registered
  const el=document.getElementById('hdr-left');
  el.style.opacity='.5'; setTimeout(()=>el.style.opacity='',150);
  if(_rtaps>=3){
    _rtaps=0;
    const pw=prompt('🔐 Enter password to reset all data:');
    if(pw==='dontdelete'){
      if(confirm('⚠️ This will permanently delete ALL health data for everyone. Are you sure?')){
        cache={logs:{},stats:{}};
        lsSet('cache',cache);
        DOC.set({data:cache}).then(()=>{
          toast('✓ Database reset complete');
          renderAll();
        }).catch(()=>toast('Reset failed — check connection'));
      }
    } else if(pw!==null){
      toast('Wrong password');
    }
  }
}

// ── Render: Calendar ──────────────────────────────────────────────────────────
function renderHist(){
  const todayStr=today();
  const nowY=new Date().getFullYear(), nowM=new Date().getMonth();
  const firstDow=new Date(histY,histM,1).getDay();
  const daysInMonth=new Date(histY,histM+1,0).getDate();
  const monthLabel=new Date(histY,histM,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const atCurrent=histY===nowY&&histM===nowM;

  const whoBar=MEMBERS.map(m=>
    `<button class="who-btn${who===m?' on':''}" onclick="setWho('${m}')"
      style="${who===m?'border-color:'+COLORS[m]+';color:'+COLORS[m]:''}">
      ${ICONS[m]} ${m}</button>`).join('');

  let h=`<h2>History 📅</h2>
  <div class="who-bar" style="margin-bottom:14px;">${whoBar}</div>
  <div class="cal-hdr">
    <button class="cal-nav-btn" onclick="calPrev()">‹</button>
    <strong>${monthLabel}</strong>
    <button class="cal-nav-btn" onclick="calNext()" ${atCurrent?'disabled':''}>›</button>
  </div>
  <div class="cal-grid">`;

  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<firstDow;i++) h+=`<div class="cal-day empty"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const ds=`${histY}-${String(histM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFuture=ds>todayStr;
    const isToday=ds===todayStr;
    const xp=cache.logs?.[ds]?.[who]?.totalXP||0;
    const virat=cache.logs?.[ds]?.[who]?.virat||false;
    let cls=isFuture?'future':xp>=131?'xp4':xp>=81?'xp3':xp>=41?'xp2':xp>0?'xp1':'';
    if(isToday) cls+=' today-cell';
    h+=`<div class="cal-day ${cls}">
      <span class="cd-num">${d}</span>
      ${xp>0?`<span class="cd-xp">${xp}</span>`:''}
      ${virat?`<span class="cd-fire">🔥</span>`:''}
    </div>`;
  }
  h+=`</div>`;
  document.getElementById('pg-cal').innerHTML=h;
}
function calPrev(){if(histM===0){histY--;histM=11;}else{histM--;}renderHist();}
function calNext(){
  const now=new Date();
  if(histY<now.getFullYear()||(histY===now.getFullYear()&&histM<now.getMonth())){
    if(histM===11){histY++;histM=0;}else{histM++;}renderHist();
  }
}

// ── Navigation ────────────────────────────────────────────────────────────────
function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+page).classList.add('on');
  document.getElementById('nav-'+page).classList.add('on');
  renderAll();
}
function setWho(m){
  who=m; lsSet('who',m);
  const pg=document.querySelector('.page.on')?.id?.replace('pg-','');
  if(pg==='cal') renderHist(); else renderLog();
}
function setLbPer(p){ lbPeriod=p; renderBoard(); }

// ── Init ──────────────────────────────────────────────────────────────────────
function init(){
  who=lsGet('who','Dad');
  cache=lsGet('cache',{logs:{},stats:{}});
  MEMBERS.forEach(checkStreakBreak);
  document.getElementById('hdrDate').textContent=
    new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  listenFS();
  renderToday();
}

init();
</script>
